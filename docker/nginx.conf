# nginx config for the prerendered, static Bosco site. Serves directory-index pages emitted by
# adapter-static with trailingSlash: 'always' (route/index.html). No upstream, no dynamic layer.

server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# Serve precompressed .gz siblings when present (adapter precompress: true).
	gzip_static on;

	# Directory-index resolution: hashed asset -> route/index.html -> route.html -> plain 404.
	# Every route is prerendered (fallback: undefined), so a miss is a genuine unknown path; nginx
	# returns a bare 404 (a styled 404 page is a Phase 1 nicety, not a Phase 0 requirement).
	location / {
		try_files $uri $uri/index.html $uri.html =404;
		add_header Cache-Control "no-cache";
	}

	# Immutable, content-hashed assets can be cached hard. Higher-priority regex location wins for
	# these extensions over `location /`.
	location ~* \.(?:js|mjs|css|woff2|png|jpe?g|webp|avif|svg|ico|mp3)$ {
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}
}
