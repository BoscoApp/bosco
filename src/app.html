<!doctype html>
<html lang="en" data-theme="clubhouse" data-lit="green" data-tier="explorer">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light" />
		<script>
			/* Anti-flash: apply saved theme + reading level before first paint, so the page never
			   flickers from the defaults. The liturgical wallpaper (data-lit) is resolved from the
			   bundled calendar once the app mounts. Fully defensive — never throws. */
			(function () {
				try {
					var s = JSON.parse(localStorage.getItem('bosco:state') || 'null');
					var p = s && s.prefs;
					if (!p) return;
					var el = document.documentElement;
					if (p.theme) el.setAttribute('data-theme', p.theme);
					var tier = { 1: 'seedling', 2: 'explorer', 3: 'scholar' }[p.tier];
					if (tier) el.setAttribute('data-tier', tier);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
