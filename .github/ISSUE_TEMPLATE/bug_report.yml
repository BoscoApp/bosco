name: Bug report
description: Something in Bosco isn't working
labels: ['type: fix', 'needs-triage']
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps, if you can.
  - type: input
    id: env
    attributes:
      label: Where?
      description: Browser + device, and whether it's the public site or the Docker/self-hosted image.
