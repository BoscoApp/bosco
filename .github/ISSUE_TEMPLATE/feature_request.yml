name: Feature request
description: Suggest something for Bosco
labels: ['type: feature', 'needs-triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem or need
      description: What's missing, and for whom (a young reader, a parent, a self-hosting family)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know it's done?
