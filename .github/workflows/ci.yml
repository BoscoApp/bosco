name: ci

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint PR title (Conventional Commits)
        if: github.event_name == 'pull_request'
        run: node scripts/check-pr-title.mjs "${{ github.event.pull_request.title }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type + a11y check
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Colour guard (component colours come from tokens)
        run: pnpm guard:colour

      - name: Build (all routes prerender)
        run: pnpm build

      - name: Offline guard (no external URLs)
        run: pnpm guard:external

      - name: Content gate (no unreviewed content in production)
        run: pnpm guard:content

      - name: Offline smoke (static output serves with no backend)
        run: pnpm guard:offline

      - name: Unit tests
        run: pnpm test:unit
