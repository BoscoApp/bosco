name: release-please

# On push to main, release-please maintains a release PR (version bump + CHANGELOG from
# Conventional Commits). Merging that PR tags vX.Y.Z and creates the GitHub Release, which triggers
# deploy.yml. Prepend the release-notes banner/What's New/Installing to the release body by hand.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
