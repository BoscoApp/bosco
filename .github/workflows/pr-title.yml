name: pr-title

# Enforce Conventional Commit PR titles (release-please reads them). Blocking on PRs into develop
# even though develop is otherwise ungated — a bad title breaks the changelog.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [develop, main]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            build
            ci
            chore
            revert
